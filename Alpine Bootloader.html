<!DOCTYPE html>
<html>
<head>
    <title>Alpine: Offline Streamer</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #terminal { width: 100vw; height: 100vh; display: none; }
        #menu { padding: 20px; background: #222; border: 2px solid #0f0; text-align: center; }
        button, input { margin-top: 10px; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="menu">
        <h2>Alpine Linux Offline Bootloader</h2>
        <p>1. Make sure you have downloaded the <b>alpine-virt-3.18.4-x86.iso</b> file.</p>
        <p>2. Click below to load it from your Chromebook.</p>
        <input type="file" id="iso-upload" accept=".iso">
        <br>
        <button id="start-btn" disabled>Start Virtual Machine</button>
    </div>

    <div id="terminal"></div>

    <script src="https://copy.sh/v86/build/libv86.js"></script>
    
    <script>
        const isoInput = document.getElementById("iso-upload");
        const startBtn = document.getElementById("start-btn");
        let selectedFile = null;

        // Unlock the start button once a file is chosen
        isoInput.addEventListener("change", function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                startBtn.innerText = "Start Virtual Machine";
                startBtn.disabled = false;
            }
        });

        startBtn.addEventListener("click", function() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("terminal").style.display = "block";

            // Booting v86 and feeding it the local file directly!
            const emulator = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: 256 * 1024 * 1024,
                vga_canvas: document.createElement("canvas"),
                term_container: document.getElementById("terminal"),
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                
                // This tells v86 to stream the file you selected!
                cdrom: { file: selectedFile }, 
                
                autostart: true,
            });
        });
    </script>
</body>
</html>
